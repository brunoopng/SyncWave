<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SyncWave — Watch Party</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#FAEDF0;--bg2:#FFF5F7;--pink:#FF4D79;--pink-2:#FF2E63;--muted:#8D99AE;
      --card: rgba(255,255,255,0.85);--glass-border: rgba(255,255,255,0.5);
      --max-width:1200px;--radius:24px;
      --control-size:42px;
      --control-bg: rgba(0,0,0,0.35);
      --control-fg: #fff;
    }
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);color:#111;padding:28px;}
    .blob{position:absolute;filter:blur(80px);z-index:-1;opacity:0.6}
    .blob-1{width:400px;height:400px;background:#FF4D79;border-radius:50%;top:-120px;left:-120px}
    .blob-2{width:300px;height:300px;background:#FFB3C6;border-radius:50%;bottom:-80px;right:-80px}
    .app{width:100%;max-width:var(--max-width);height:85vh;background:var(--card);border-radius:32px;box-shadow:0 20px 60px rgba(20,20,30,0.08);display:grid;grid-template-columns:1fr 360px;overflow:hidden;border:1px solid var(--glass-border);backdrop-filter: blur(12px)}
    .left{padding:32px;display:flex;flex-direction:column;gap:20px}
    header{display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;gap:12px;align-items:center}
    .logo{color:var(--pink);font-weight:700;font-size:20px;letter-spacing:-0.5px}
    .tag{font-size:12px;color:var(--muted)}
    .top-actions{display:flex;gap:10px;align-items:center}
    .btn{border:0;padding:10px 16px;border-radius:999px;font-weight:600;cursor:pointer;display:inline-flex;gap:8px;align-items:center;justify-content:center;transition:all .18s ease}
    .btn.primary{background:var(--pink);color:#fff;box-shadow:0 8px 18px rgba(255,77,121,0.18)}
    .btn.primary:hover{transform:translateY(-3px);background:var(--pink-2)}
    .btn.ghost{background:rgba(255,255,255,0.9);color:var(--pink);border:1px solid rgba(255,77,121,0.08)}
    .room-controls{display:flex;gap:8px;align-items:center}
    .room-controls input[type="text"]{padding:10px 12px;border-radius:12px;border:1px solid #eee;width:220px;outline:none;background:transparent}
    .player-wrap{flex:1;display:flex;flex-direction:column;gap:16px}

    /* video card */
    .video-card{ background:transparent;border-radius:20px;position:relative;overflow:visible;display:block; }
    .video-inner{ background:#000;border-radius:20px;padding:12px;overflow:hidden;position:relative;min-height:320px;display:flex;align-items:center;justify-content:center; }

    .placeholder{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:22px; z-index:3; pointer-events:auto; color:rgba(255,255,255,0.95); gap:10px; }
    .placeholder h3{margin:0;font-size:18px}
    .placeholder p{margin:0;font-size:13px;color:rgba(255,255,255,0.85)}

    /* video element */
    video{ position:absolute; inset:0; z-index:2; width:100%; height:100%; display:none; background:#000; /* changed to cover to fill área sem barras pretas */ object-fit:contain; border-radius:12px; }

    /* container used for youtube player iframe */
    #yt-player { position:absolute; inset:0; z-index:2; width:100%; height:100%; display:none; border-radius:12px; overflow:hidden; background:#000; }

/* NOTE: iframe inside #yt-player cannot be styled from inside, but this rule ensures the iframe element itself fills the container.
   pointer-events:none evita que o overlay do YouTube capture cliques — o controle passa a ser apenas pelo overlay do seu site. */
    #yt-player > div > iframe,
    #yt-player iframe {
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      pointer-events: none !important;
      background: #000;
    }

    .upload-area{
      margin-top:12px;
      display:flex;
      gap:8px;
      align-items:center;
      z-index:4;
      position:relative;
      flex-direction:column;
      align-items:center;
    }

    .upload-controls{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:center;
    }

    .file-label{
      position:relative;display:inline-flex;align-items:center;gap:10px;padding:10px 16px;border-radius:999px;background:var(--pink);color:#fff;cursor:pointer;
      box-shadow:0 8px 18px rgba(255,77,121,0.18);
      transition:all .18s ease;
      font-weight:600;
    }
    .file-label:hover{
      transform:translateY(-3px);
      background:var(--pink-2);
    }
    .file-label input[type="file"]{position:absolute;left:0;top:0;width:100%;height:100%;opacity:0;cursor:pointer}

    .upload-status {
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
      min-height:18px;
      text-align:center;
      max-width:420px;
      word-break:break-word;
    }

    .status-line{
      color:var(--muted);font-size:13px;margin-left:6px;
    }

    .right{background: rgba(255,255,255,0.45);border-left:1px solid var(--glass-border);padding:28px;display:flex;flex-direction:column;gap:18px}
    .room-info h2{font-size:18px;margin-bottom:4px}
    .room-info p{font-size:13px;color:var(--muted)}
    .chat{flex:1;background:#fff;padding:14px;border-radius:14px;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 24px rgba(0,0,0,0.03)}
    .messages{flex:1;overflow:auto;display:flex;flex-direction:column;gap:10px;padding-right:6px}
    .msg{background:#F8F9FA;padding:10px 12px;border-radius:12px;max-width:85%;font-size:13px}
    .msg.mine{background:var(--pink);color:#fff;align-self:flex-end}
    .chat-input{display:flex;gap:8px;align-items:center}
    .chat-input input{flex:1;padding:10px;border-radius:999px;border:1px solid #eee;outline:none}

    .send-btn{
      width:44px;height:44px;border-radius:50%;background:transparent;color:var(--pink);border:1px solid rgba(255,77,121,0.12);cursor:pointer;
      display:inline-flex;align-items:center;justify-content:center;font-weight:700;transition:all .14s ease;
    }
    .send-btn:hover{transform:translateY(-2px);background:rgba(255,77,121,0.06)}
    .send-btn svg{width:14px;height:14px;fill:var(--pink)}

    .btn-ctl svg, .send-btn svg, .controls-overlay svg, .file-label svg {
      shape-rendering: geometricPrecision;
      image-rendering: optimizeQuality;
      vector-effect: non-scaling-stroke;
      display: block;
    }

    .controls-overlay{
      position:absolute;
      left:12px;
      right:12px;
      bottom:12px;
      z-index:5;
      display:none;
      align-items:center;
      gap:10px;
      justify-content:space-between;
      pointer-events:none;
      transition:opacity .22s ease, transform .22s ease;
      opacity:0;
      transform:translateY(8px);
    }

    .controls-overlay.visible{
      display:flex;
      pointer-events:auto;
      opacity:1;
      transform:translateY(0);
    }

    .controls-left{display:flex;gap:8px;align-items:center}
    .controls-center{flex:1;display:flex;align-items:center;gap:12px;padding:0 8px}
    .controls-right{display:flex;gap:8px;align-items:center}

    .btn-ctl{
      width:36px;height:36px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;background:var(--control-bg);color:var(--control-fg);border:0;
      box-shadow:0 6px 14px rgba(0,0,0,0.25);backdrop-filter: blur(6px);cursor:pointer;transition:transform .12s ease, background .12s ease;
    }
    .btn-ctl:hover{transform:translateY(-3px);background:rgba(0,0,0,0.5)}
    .btn-ctl.primary{width:44px;height:44px;border-radius:12px;background:var(--pink);color:#fff;box-shadow:0 10px 22px rgba(255,77,121,0.18)}
    .btn-ctl svg{width:16px;height:16px;display:block;fill:currentColor}

    .time-small{font-size:12px;color:rgba(255,255,255,0.9);min-width:48px;text-align:center}
    .progress{
      height:6px;border-radius:999px;background:rgba(255,255,255,0.08);position:relative;cursor:pointer;flex:1;overflow:hidden;
    }
    .progress .bar{position:absolute;left:0;top:0;height:100%;width:0%;background:linear-gradient(90deg,var(--pink),var(--pink-2));border-radius:999px;transition:width .08s linear}
    .progress .handle{position:absolute;right:0;top:50%;transform:translate(50%,-50%);width:10px;height:10px;border-radius:50%;background:#fff;box-shadow:0 6px 12px rgba(0,0,0,0.2);opacity:0;transition:opacity .12s}
    .progress:hover .handle{opacity:1}

    .btn-ctl.fullscreen svg {
      fill: none;
      stroke: currentColor;
      stroke-width: 1.6;
      stroke-linecap:round;
      stroke-linejoin:round;
      vector-effect: non-scaling-stroke;
    }

    /* Quality control (three dots) */
    .video-topbar { position: absolute; top: 8px; right: 8px; z-index: 20; display:flex; gap:8px; align-items:center; pointer-events: none; }
    .quality-control { position: relative; pointer-events: auto; }
    .qc-btn {
      width:40px;height:40px;border-radius:10px;border:0;display:inline-flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.36);color:var(--control-fg);cursor:pointer;
      box-shadow:0 8px 20px rgba(0,0,0,0.28);backdrop-filter: blur(6px);transition:transform .12s ease, background .12s;
    }
    .qc-btn:hover{ transform:translateY(-3px); background:rgba(0,0,0,0.5); }
    .qc-btn .dots { display:block; font-size:18px; line-height:1; letter-spacing:2px; opacity:0.95; color: #fff; }
    .qc-menu {
      position: absolute; top: calc(100% + 10px); right: 0; min-width:170px; border-radius:12px; padding:8px; display:flex; flex-direction:column; gap:6px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(250,250,250,0.94)); color:#111; box-shadow:0 18px 40px rgba(10,10,20,0.12); border:1px solid rgba(0,0,0,0.06);
      transform-origin: top right; transform: translateY(-6px) scale(0.98); opacity:0; pointer-events:none; transition:opacity .12s, transform .12s;
    }
    .qc-menu.visible { transform: translateY(0) scale(1); opacity:1; pointer-events:auto; }
    .qc-item {
      background: transparent; border: 0; padding:10px 12px; text-align:left; border-radius:10px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:space-between;
    }
    .qc-item:hover { background: rgba(0,0,0,0.04); }
    .qc-item[aria-disabled="true"] { opacity:0.5; cursor:not-allowed; }
    .qc-check { width:18px; height:18px; display:inline-block; border-radius:4px; margin-left:8px; opacity:0; }
    .qc-item.selected .qc-check { background: linear-gradient(90deg,var(--pink),var(--pink-2)); box-shadow:0 6px 14px rgba(255,77,121,0.12); opacity:1; }

    @media (min-width:1100px){
      :root{--max-width:1400px}
      .app{height:92vh;grid-template-columns:1.6fr 360px;padding:28px 36px}
      .left{padding:40px}
      .video-inner{min-height:560px}
    }
    @media (max-width:980px){
      .app{grid-template-columns:1fr;height:auto;max-height:none;padding-bottom:40px}
      .right{order:2}.left{order:1}.video-inner{min-height:320px}
      .controls-overlay{left:8px;right:8px;bottom:8px}
      .qc-menu { right: 8px; left: auto; }
    }

    /* Modal de Apelido (Nickname) */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(20, 20, 30, 0.3);
      backdrop-filter: blur(8px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-content {
      background: var(--card);
      border: 1px solid var(--glass-border);
      padding: 32px;
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.12);
      width: 90%;
      max-width: 340px;
      transform: translateY(20px);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-align: center;
    }
    .modal-overlay.visible .modal-content {
      transform: translateY(0);
    }
    .modal-title {
      font-size: 18px;
      color: #111;
      margin: 0;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .modal-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin: -8px 0 4px 0;
    }
    .modal-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #eee;
      outline: none;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.8);
      transition: all 0.2s ease;
      text-align: center;
    }
    .modal-input:focus {
      border-color: var(--pink);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(255,77,121,0.1);
    }
    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .modal-actions .btn {
      width: 100%;
      padding: 14px;
      font-size: 14px;
    }

    /* estilos para o botão Mudar vídeo (harmoniza com os outros) */
    #changeVideoBtn {
      display: none;
      margin-right: 6px;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
      gap: 8px;
      align-items: center;
      justify-content: center;
      transition: transform .18s cubic-bezier(.2,.9,.3,1), box-shadow .18s ease, background .18s ease;
      background: var(--pink);
      color: #fff;
      border: 0;
      box-shadow: 0 10px 22px rgba(255,77,121,0.18);
    }
    /* hover/press */
    #changeVideoBtn:hover {
      transform: translateY(-3px) scale(1.02);
      background: var(--pink-2);
    }
    /* foco / teclado */
    #changeVideoBtn:focus { outline: 0; box-shadow: 0 10px 28px rgba(255,77,121,0.22); transform: translateY(-2px) }

    /* pequena animação de pulso quando há vídeo carregado (usar via JS: add class 'pulse') */
    @keyframes pulseGlow {
      0% { box-shadow: 0 8px 18px rgba(255,77,121,0.12); transform: translateY(0) scale(1); }
      50% { box-shadow: 0 18px 36px rgba(255,77,121,0.18); transform: translateY(-2px) scale(1.01); }
      100% { box-shadow: 0 8px 18px rgba(255,77,121,0.12); transform: translateY(0) scale(1); }
    }
    #changeVideoBtn.pulse { animation: pulseGlow 2s ease-in-out infinite; }

  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="app" role="application">
    <div class="left">
      <header>
        <div class="brand">
          <div class="logo">SyncWave.</div>
          <div class="tag">watch party</div>
        </div>

        <div class="top-actions">
          <div class="room-controls">
            <!-- NOVO: botão Mudar vídeo (visível apenas quando um vídeo está carregado) -->
            <button id="changeVideoBtn" class="btn">Mudar vídeo</button>

            <input id="roomInput" type="text" placeholder="Nome da sala (ex: sala123)" />
            <button id="createBtn" class="btn primary">Criar sala</button>
            <button id="joinBtn" class="btn primary">Entrar</button>
          </div>
        </div>
      </header>

      <div class="player-wrap">
        <div class="video-card" id="videoCard">
          <div class="video-inner" id="videoInner">
            <div class="placeholder" id="placeholder">
              <svg viewBox="0 0 24 24" style="width:56px;height:56px;margin-bottom:10px;opacity:0.9"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
              <h3>Nenhum vídeo em reprodução</h3>
              <p>Faça o upload para assistir com seus amigos</p>

              <div class="upload-area">
                <div class="upload-controls">
                  <label class="file-label">Selecionar vídeo
                    <input id="fileInput" type="file" accept="video/mp4,video/*">
                  </label>
                  <button id="uploadBtn" class="btn primary" disabled>Enviar</button>
                </div>

                <!-- YouTube agora é um botão idêntico ao 'Selecionar vídeo' e sem modal -->
                <div style="margin-top:10px;">
                  <button id="youtubeBtn" class="file-label" title="Adicionar vídeo do YouTube">
                    <!-- youtube svg -->
                    <svg viewBox="0 0 24 24" width="18" height="18" style="filter:drop-shadow(0 2px 6px rgba(0,0,0,0.12));">
                      <path fill="#fff" d="M10 15l5.2-3L10 9v6z"></path>
                      <path fill="#fff" d="M21.8 8s-.2-1.6-.8-2.3c-.8-.9-1.7-.9-2.1-1-2.9-.2-7.2-.2-7.2-.2s-4.3 0-7.2.2c-.4.1-1.3.1-2.1 1C2.4 6.4 2.2 8 2.2 8S2 9.9 2 11.8v.4c0 1.9.2 3.8.2 3.8s.2 1.6.8 2.3c.8.9 1.9.9 2.4 1 1.7.1 7.2.2 7.2.2s4.3 0 7.2-.2c.4-.1 1.3-.1 2.1-1 .6-.7.8-2.3.8-2.3s.2-1.9.2-3.8v-.4c0-1.9-.2-3.8-.2-3.8z"/>
                    </svg>
                    <span style="font-weight:700">YouTube</span>
                  </button>
                </div>

                <div class="upload-status"><span id="uploadStatus"></span></div>
              </div>
            </div>

            <video id="video" playsinline></video>
            <div id="yt-player" aria-live="polite"></div>

            <div class="controls-overlay" id="controlsOverlay" aria-hidden="true">
              <div class="controls-left">
                <button class="btn-ctl" id="backBtn" title="Retroceder 10s" aria-label="Retroceder 10 segundos">
                  <svg viewBox="0 0 24 24"><path d="M11 18V6l-8 6 8 6zm10 0V6l-8 6 8 6z"/></svg>
                </button>

                <button class="btn-ctl primary" id="playBtn" title="Play/Pause" aria-label="Play/Pausar">
                  <svg id="ctlPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                  <svg id="ctlPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>

                <button class="btn-ctl" id="forwardBtn" title="Avançar 10s" aria-label="Avançar 10 segundos">
                  <svg viewBox="0 0 24 24"><path d="M3 6v12l8.5-6L3 6zm10 0v12l8.5-6L13 6z"/></svg>
                </button>
              </div>

              <div class="controls-center">
                <div class="time-small" id="currentTime">0:00</div>
                <div class="progress" id="progress">
                  <div class="bar" id="progressBar"></div>
                  <div class="handle" id="progressHandle"></div>
                </div>
                <div class="time-small" id="duration">0:00</div>
              </div>

              <div class="controls-right">
                <button class="btn-ctl" id="muteBtn" title="Mudo" aria-label="Mudo">
                  <svg id="volIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
                </button>

                <button class="btn-ctl fullscreen" id="fsBtn" title="Tela cheia" aria-label="Tela cheia">
                  <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                    <path d="M3 9V6a1 1 0 0 1 1-1h3"/>
                    <path d="M21 9V6a1 1 0 0 0-1-1h-3"/>
                    <path d="M3 15v3a1 1 0 0 0 1 1h3"/>
                    <path d="M21 15v3a1 1 0 0 1-1 1h-3"/>
                  </svg>
                </button>
              </div>
            </div>

            <!-- Quality control (three dots) - appears only when video is loaded -->
            <div class="video-topbar" aria-hidden="true">
              <div class="quality-control" id="qualityControl" hidden>
                <button id="qualityBtn" class="qc-btn" aria-haspopup="true" aria-expanded="false" title="Qualidade do vídeo">
                  <span class="dots" aria-hidden="true">⋯</span>
                </button>

                <div class="qc-menu" id="qualityMenu" role="menu" aria-hidden="true">
                  <!-- items injected dynamically -->
                </div>
              </div>
            </div>
            <!-- END -->
          </div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="color:var(--muted);font-size:13px" id="status">Conectando...</div>
          <div style="color:var(--muted);font-size:13px" id="qualityLabel">Qualidade: -</div>
        </div>
      </div>
    </div>

    <aside class="right">
      <div class="room-info">
        <h2 id="roomTitle">Sala</h2>
        <p id="roomCount">0 pessoas assistindo</p>
      </div>

      <div class="chat">
        <div class="messages" id="messages">
          <div class="msg">Bem-vindo à sala!</div>
        </div>

        <div class="chat-input">
          <input id="chatInput" type="text" placeholder="Digite uma mensagem..." />
          <button id="sendBtn" class="send-btn" title="Enviar mensagem" aria-label="Enviar mensagem">
            <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
          </button>
        </div>
      </div>
    </aside>
  </div>

  <!-- ---------- Modal 'Como quer ser chamado?' ---------- -->
  <div class="modal-overlay" id="nickModal" aria-hidden="true">
    <div class="modal-content">
      <h3 class="modal-title">Como quer ser chamado?</h3>
      <p class="modal-subtitle">Digite seu nome para o chat da sala</p>
      <div class="modal-actions">
        <input type="text" id="nickInput" class="modal-input" placeholder="Seu apelido..." autocomplete="off" maxlength="40" />
        <button id="nickSaveBtn" class="btn primary">Entrar na Sala</button>
      </div>
    </div>
  </div>
  <!-- ------------------------------------------------------------------------------- -->

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // elements
    const socket = io();
    const roomInput = document.getElementById('roomInput');
    const createBtn = document.getElementById('createBtn');

    function fmtSize(bytes){
      if (!bytes) return '0 B';
      const units = ['B','KB','MB','GB'];
      let i=0; let v=bytes;
      while(v>=1024 && i<units.length-1){ v/=1024; i++; }
      return v.toFixed(i===0?0:2) + ' ' + units[i];
    }

    // -------------------------
    // setVideo accepts:
    //  - null -> clears
    //  - string -> direct video url
    //  - object: { video: url } (same as before)
    //  - object: { youtube: "<id>" } -> youtube id
    // -------------------------
    function setVideo(src){
      clearYouTubePlayerInterval();

      let videoUrl = null;
      qualitiesMap = null;
      originalSrc = null;

      // clear previous youtube ui
      function cleanupVideoElement(){
        try { video.pause(); } catch(e){}
        try { video.removeAttribute('src'); video.load(); } catch(e){}
        video.style.display = 'none';
      }

      function cleanupYouTubeElement(){
        if (ytPlayer && typeof ytPlayer.destroy === 'function') {
          try { ytPlayer.stopVideo(); } catch(e){}
          try { ytPlayer.destroy(); } catch(e){}
        }
        ytPlayer = null;
        isYouTube = false;
        ytContainer.style.display = 'none';
        try { uploadStatus.innerHTML = ''; } catch(e){}
      }

      if (!src) {
        cleanupVideoElement();
        cleanupYouTubeElement();
        placeholder.style.display = 'flex';
        hideControlsNow();
        if (qualityControl) { qualityControl.hidden = true; qualityControl.setAttribute('aria-hidden','true'); }
        qualityLabel.textContent = 'Qualidade: -';
        // hide change video button
        showChangeBtn(false);
        return;
      }

      // If server sent an object with youtube id
      if (typeof src === 'object' && src !== null && src.youtube) {
        // youtube mode
        const id = src.youtube;
        originalSrc = 'youtube:' + id;
        cleanupVideoElement();
        cleanupYouTubeElement();
        openYouTubePlayer(id);
        qualityLabel.textContent = 'Qualidade: YouTube';
        placeholder.style.display = 'none';
        // show change video button (since a video is present)
        showChangeBtn(true);
        return;
      }

      // legacy: object containing video url
      if (typeof src === 'object' && src !== null && src.video) {
        videoUrl = src.video;
        if (src.qualities && typeof src.qualities === 'object') {
          qualitiesMap = src.qualities;
        }
      } else if (typeof src === 'string') {
        videoUrl = src;
      } else {
        console.warn('setVideo: formato de src inesperado', src);
        return;
      }

      // normal <video> flow (existing)
      originalSrc = videoUrl;

      if (qualitiesMap && !qualitiesMap['original']) {
        qualitiesMap = Object.assign({ original: originalSrc }, qualitiesMap);
        currentQuality = 'original';
      } else if (!qualitiesMap) {
        qualitiesMap = {
          'Auto': originalSrc,
          '1080p': originalSrc,
          '720p': originalSrc,
          '480p': originalSrc,
          '360p': originalSrc,
          'original': originalSrc
        };
        currentQuality = 'Auto';
      }

      // ensure youtube cleaned
      if (ytPlayer && typeof ytPlayer.destroy === 'function') {
        try { ytPlayer.destroy(); } catch(e){}
      }
      isYouTube = false;
      ytContainer.style.display = 'none';

      const onReady = () => {
        try { video.removeEventListener('loadedmetadata', onReady); } catch(e){}
        try { video.removeEventListener('canplay', onReady); } catch(e){}
        video.style.display = 'block';
        placeholder.style.display = 'none';
        showControlsTemporarily();
        updatePlayPauseUI();
      };

      video.src = originalSrc;
      try { video.load(); } catch(e){}
      video.addEventListener('loadedmetadata', onReady, { once: true });
      video.addEventListener('canplay', onReady, { once: true });

      if (qualityControl) {
        qualityControl.hidden = false;
        qualityControl.setAttribute('aria-hidden','false');
        populateQualityMenu();
      }
      qualityLabel.textContent = 'Qualidade: ' + currentQuality;

      // show change video button now that a normal video is loaded
      showChangeBtn(true);
    }

    function populateQualityMenu(){
      while (qualityMenu.firstChild) qualityMenu.removeChild(qualityMenu.firstChild);

      const preferredOrder = ['Auto','1080p','720p','480p','360p','original'];
      const keys = Object.keys(qualitiesMap || {});
      const ordered = preferredOrder.filter(k => keys.includes(k)).concat(keys.filter(k => !preferredOrder.includes(k)));

      ordered.forEach((k) => {
        const btn = document.createElement('button');
        btn.className = 'qc-item' + (k === currentQuality ? ' selected' : '');
        btn.setAttribute('role','menuitem');
        btn.dataset.quality = k;
        btn.textContent = k;
        const check = document.createElement('span');
        check.className = 'qc-check';
        btn.appendChild(check);
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          changeQuality(k);
          closeQualityMenu();
        });
        qualityMenu.appendChild(btn);
      });
    }

    function changeQuality(key){
      if (!originalSrc) return;
      if (key === currentQuality) return;

      let newSrc = (qualitiesMap && qualitiesMap[key]) ? qualitiesMap[key] : originalSrc;

      const wasPlaying = !video.paused && !video.ended;
      const currentTime = video.currentTime || 0;

      try { video.pause(); } catch(e){}
      video.src = newSrc;
      try { video.load(); } catch(e){}
      const resume = () => {
        try { video.currentTime = Math.min(currentTime, (video.duration || currentTime)); } catch(e){}
        if (wasPlaying) {
          const p = video.play();
          if (p && p.then) p.catch(()=>{});
        }
        updatePlayPauseUI();
        video.removeEventListener('loadedmetadata', resume);
        // ALTERADO: após trocar qualidade, notificar servidor do tempo/estado para manter a sincronização.
        try { sendControl(!video.paused); } catch(e){}
      };
      video.addEventListener('loadedmetadata', resume);

      currentQuality = key;
      qualityLabel.textContent = 'Qualidade: ' + key;
      Array.from(qualityMenu.children).forEach(it => {
        it.classList.toggle('selected', it.dataset.quality === key);
      });
    }

    function updatePlayPauseUI(){
      if (isYouTube) {
        // get state from ytPlayer if available
        try {
          const st = ytPlayer && typeof ytPlayer.getPlayerState === 'function' ? ytPlayer.getPlayerState() : null;
          // YT states: -1 unstarted, 0 ended, 1 playing, 2 paused, 3 buffering, 5 cued
          if (st === 1) {
            ctlPlay.style.display = 'none';
            ctlPause.style.display = 'block';
          } else {
            ctlPlay.style.display = 'block';

    // -------------------------
    // sync emit
    // -------------------------
    function sendControl(playing){
      if (!room) return;
      if (syncing) return;
      let time = 0;
      if (isYouTube && ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
        time = ytPlayer.getCurrentTime();
      } else {
        time = video.currentTime || 0;
      }
      const payload = { room, time: time, playing: !!playing, ts: nowMs(), client: socket.id, host: !!isHost };
      safeEmit('control', payload);

      // ALTERADO: se o cliente NÃO é host, pedir ao servidor o estado autorizado (request-sync) logo em seguida.
      // Isso corrige casos em que o servidor considera o host a única fonte de verdade:
      // o guest emite sua intenção e pede a sincronização oficial — evita perder a referência.
      if (!isHost) {
        setTimeout(()=> { try { safeEmit('request-sync', { room, ts: nowMs(), client: socket.id }); } catch(e){} }, 250);
      }
    }

    // -------------------------
    // chat & socket handlers
    // -------------------------
    socket.on('connect', () => { logStatus('Conectado'); console.log('socket conectado', socket.id); });
    socket.on('video-ready', (src) => {
      // server may send { youtube: id } or a string/url or object { video: url }
      setVideo(src);
      logStatus('Vídeo disponível');

    socket.on('youtube', (data) => {
      if (data && (data.id || data.youtube)) setVideo({ youtube: data.id || data.youtube });

    socket.on('room-count', n => { roomCount.textContent = (n || 0) + ' pessoas assistindo'; });

    // ALTERADO: chat-history -> mantém autoscroll coerente e preserva histórico rolável.
    socket.on('chat-history', hist => {

      if (Array.isArray(hist)) hist.forEach(m=> appendMessage(m));

      try { messages.scrollTop = messages.scrollHeight; } catch(e){}

    socket.on('chat-message', msg => appendMessage(msg));

    // ALTERADO: centralizei a rotina de aplicar sync em handleSync e escuto tanto 'sync' quanto 'control' (alguns servidores emitem 'control' pro broadcast)
    function handleSync(payload) {
      if (!payload || typeof payload.ts !== 'number') return;
      if (payload.ts <= lastAppliedTs) return;
      lastAppliedTs = payload.ts;
      syncing = true;
      try {
        if (isYouTube && ytPlayer) {
          const localTime = ytPlayer.getCurrentTime ? ytPlayer.getCurrentTime() : 0;
          if (Math.abs(localTime - payload.time) > SEEK_THRESHOLD) {
            try { ytPlayer.seekTo(payload.time, true); } catch(e){}
          }
          if (payload.playing) {
            try { ytPlayer.playVideo(); } catch(e){}
          } else {
            try { ytPlayer.pauseVideo(); } catch(e){}
          }
          syncing = false;
        } else {
          if (Math.abs(video.currentTime - payload.time) > SEEK_THRESHOLD) {
            try { video.currentTime = payload.time; } catch(e){}
          }
          if (payload.playing) {
            const p = video.play();
            if (p && p.then) p.then(()=> syncing=false).catch(()=> syncing=false);
            else syncing=false;
          } else {
            try { video.pause(); } catch(e){}
            syncing=false;
          }
        }
      } catch(e) { console.error(e); syncing=false; }
    }
    // original listener replaced to call handleSync
    socket.on('sync', handleSync);
    // ALTERADO: também escutar 'control' vindo do servidor (alguns backends re-broadcastam com esse nome)
    socket.on('control', handleSync);

    // UI actions: create/join
    createBtn.addEventListener('click', () => {
      const r = roomInput.value.trim(); if (!r) return alert('Digite o nome da sala');
      room = r; isHost = true; askNick();

    joinBtn.addEventListener('click', () => {

      uploadBtn.disabled = false;

      // If we're in confirm (change) flow, set pendingFile instead of auto-sending
      if (changeMode) {

        // keep file in input (we'll upload when user clicks "Enviar (temporário)")
        uploadStatus.textContent = `Arquivo selecionado: ${f.name} (${fmtSize(f.size)}). Clique em "Enviar (temporário)" para aplicar à sala.`;
      }
    });

    // regular uploadBtn click (legacy direct upload) remains available
    if (uploadBtn) {
      uploadBtn.addEventListener('click', async () => {
        const f = fileInput.files[0];
        if (!f) return alert('Escolha um arquivo antes de enviar');
        if (!room) return alert('Crie a sala primeiro');
        uploadBtn.disabled = true;
        uploadStatus.textContent = 'Enviando...';
        const fd = new FormData(); fd.append('video', f); fd.append('room', room);
        try {
          let res = await fetch(`/upload/${encodeURIComponent(room)}`, { method:'POST', body: fd });
          if (!res.ok) {
            console.warn('/upload/:room falhou', res.status);
            res = await fetch('/upload', { method:'POST', body: fd });
          }
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const json = await res.json();

          // NORMALIZA o objeto de vídeo que será usado localmente e emitido
          let payload;
          if (typeof json === 'string') {
            payload = { video: json };
          } else if (json && json.video) {
            payload = json;
          } else if (json && typeof json === 'object') {
            payload = json;
          } else {
            throw new Error('Resposta inválida do servidor');
          }

          // aplica localmente (setVideo aceita string ou objeto { video: url, ... })
          try {
            if (payload.video) setVideo(payload);
            else setVideo(payload);
          } catch(e){ console.warn('setVideo fallback', e); }

          // status UI
          uploadStatus.textContent = 'Upload concluído';
          logStatus('Upload OK — vídeo disponível');
          fileInput.value = '';
          uploadBtn.disabled = true;

          // EMITE PARA O SERVIDOR COM A SALA (garante broadcast)
          try {
            socket.emit('video-ready', { room, video: payload }, (ack) => {
              if (ack && ack.ok) console.log('server ack video-ready');
            });
          } catch (err) {
            try { socket.emit('video-ready', payload); } catch(_) { console.warn('emit video-ready falhou', _); }
          }

        } catch (err) {
          console.error('Erro upload', err);
          uploadStatus.textContent = 'Erro no upload';
          alert('Erro no upload: ' + (err.message || err));
          uploadBtn.disabled = false;
        }
      });
    }

    // -------------------------
    // YouTube simple flow (PROMPT, sem modal)
    // -------------------------
    function extractYouTubeID(input){
      if (!input) return null;
      input = String(input).trim().replace(/[<>]/g,'');
      const regex = /(?:youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|v\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/i;
      const m = input.match(regex);
      if (m && m[1]) return m[1];
      if (/^[A-Za-z0-9_-]{11}$/.test(input)) return input;
      try {
        const q = (new URLSearchParams((input.split('?')[1]||''))).get('v');
        if (q && /^[A-Za-z0-9_-]{11}$/.test(q)) return q;
      } catch(e){}
      return null;
    }

    const YT_API_KEY = 'AIzaSyDSWsuBjVjknRxnz6GHPMWlnTwFSAsTUf4'; // SUA API KEY (atenção: exposta no cliente)

    function isoDurationToSeconds(iso) {
      if (!iso) return 0;
      const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
      if (!m) return 0;
      const h = parseInt(m[1] || 0, 10);
      const min = parseInt(m[2] || 0, 10);
      const s = parseInt(m[3] || 0, 10);
      return h * 3600 + min * 60 + s;
    }
    function fmtTimeFromSeconds(sec) {
      sec = Math.max(0, Math.floor(sec || 0));
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return m + ':' + (s < 10 ? '0' + s : s);
    }

    async function fetchYouTubeMeta(id) {
      const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,status&id=${encodeURIComponent(id)}&key=${YT_API_KEY}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('YouTube API error: ' + res.status);
      const json = await res.json();
      if (!json.items || !json.items.length) throw new Error('Vídeo não encontrado');
      const it = json.items[0];
      return {
        id,
        title: it.snippet.title,
        channelTitle: it.snippet.channelTitle,
        thumbnails: it.snippet.thumbnails,
        durationISO: it.contentDetails ? it.contentDetails.duration : null,
        durationSec: it.contentDetails ? isoDurationToSeconds(it.contentDetails.duration) : 0,
        embeddable: it.status ? !!it.status.embeddable : true
      };
    }

    // youtubeBtn (legacy) still opens prompt and sets immediately
    youtubeBtn.addEventListener('click', async () => {
      if (!room) return alert('Crie a sala primeiro');
      const raw = prompt('Cole a URL do YouTube ou o ID (11 caracteres):');
      if (!raw) return;
      const id = extractYouTubeID(raw);
      if (!id) {
        uploadStatus.textContent = 'ID inválido.';
        return;
      }
      uploadStatus.textContent = 'Carregando informações...';
      try {
        const meta = await fetchYouTubeMeta(id);
        if (!meta.embeddable) {
          uploadStatus.textContent = 'Este vídeo não permite incorporação.';
          showUnembeddableUI(id, 150);
          return;
        }
        try {
          socket.emit('youtube', { room, url: raw, id, meta }, (resp) => {
            if (!resp || !resp.ok) {
              uploadStatus.textContent = 'Erro ao adicionar vídeo: ' + (resp && resp.error ? resp.error : 'sem resposta do servidor');
              return;
            }
            setVideo({ youtube: id });
            logStatus('Vídeo do YouTube carregado (servidor confirmou)');
          });
        } catch (e) {
          console.warn('socket emit youtube failed', e);
          setVideo({ youtube: id });
          logStatus('Vídeo do YouTube carregado (aplicado localmente)');
        }
      } catch (err) {
        console.warn('fetchYouTubeMeta failed', err);
        uploadStatus.textContent = 'Não foi possível obter informações do vídeo. Verifique a URL/ID ou a quota da API.';
      }
    });

    // CHANGE VIDEO FLOW (new)
    changeVideoBtn.addEventListener('click', async (e) => {
      if (!isHost) {
        return alert('Apenas o host pode mudar o vídeo');
      }

      // If not in change/confirm mode: activate it and open chooser
      if (!changeMode) {
        enterConfirmMode();

        // quick chooser: OK -> YouTube, Cancel -> arquivo local
        const wantYT = confirm('Deseja trocar por um vídeo do YouTube?\nOK = YouTube, Cancel = enviar um arquivo local.');
        if (wantYT) {
          if (!room) {
            uploadStatus.textContent = 'Crie a sala primeiro.';
            return;
          }
          const raw = prompt('Cole a URL do YouTube ou o ID (11 caracteres):');
          if (!raw) {
            // user cancelled prompt
            pendingYouTube = null;
            uploadStatus.textContent = 'Operação cancelada pelo usuário. Clique em "Enviar (temporário)" para aplicar (nenhum vídeo) ou feche.';
            return;
          }
          const id = extractYouTubeID(raw);
          if (!id) {
            uploadStatus.textContent = 'ID inválido.';
            pendingYouTube = null;
            return;
          }
          // store pending YouTube (will be sent only when user clicks "Enviar (temporário)")
          pendingYouTube = { id, raw };
          pendingFile = null;
          uploadStatus.textContent = `Pronto: ${raw} — clique em "Enviar (temporário)" para aplicar o vídeo a sala ${room}.`;
          return;
        } else {
          // file flow: reveal upload area and open file selector
          uploadAreaShow(true);
          setTimeout(()=> {
            try { fileInput.click(); } catch(err){ console.warn('Não foi possível abrir seletor de arquivos diretamente', err); uploadStatus.textContent = 'Selecione um arquivo manualmente.'; }
          }, 140);
          uploadStatus.textContent = 'Selecione um arquivo. Após escolher, clique em "Enviar (temporário)".';
          return;
        }
      }

      // If already in confirm mode: act as "Enviar (temporário)" button
      if (changeMode) {
        // PRIORITY: pendingYouTube -> send YT; else pendingFile -> upload file; else alert
        if (pendingYouTube) {
          // try to validate meta then emit
          uploadStatus.textContent = 'Enviando vídeo do YouTube...';
          try {
            const meta = await fetchYouTubeMeta(pendingYouTube.id).catch(()=>null);
            if (meta && !meta.embeddable) {
              uploadStatus.textContent = 'Este vídeo não permite incorporação.';
              showUnembeddableUI(pendingYouTube.id, 150);
              return;
            }
            // emit to server with room; handle ack if provided
            try {
              socket.emit('youtube', { room, url: pendingYouTube.raw, id: pendingYouTube.id, meta }, (resp) => {
                if (resp && resp.ok) {
                  setVideo({ youtube: pendingYouTube.id });
                  logStatus('Vídeo do YouTube carregado (servidor confirmou)');
                } else {
                  setVideo({ youtube: pendingYouTube.id });
                  logStatus('Vídeo do YouTube carregado (aplicado localmente)');
                }
                pendingYouTube = null;
                exitConfirmMode();
              });
            } catch (err) {
              console.warn('emit youtube falhou', err);
              setVideo({ youtube: pendingYouTube.id });
              logStatus('Vídeo do YouTube carregado (aplicado localmente)');
              pendingYouTube = null;
              exitConfirmMode();
            }
          } catch (err) {
            console.warn('Erro ao enviar YouTube', err);
            uploadStatus.textContent = 'Falha ao enviar vídeo do YouTube.';
          }
          return;
        }

        if (pendingFile) {
          // upload file to server under room, same as uploadBtn flow
          if (!room) { uploadStatus.textContent = 'Crie a sala primeiro.'; return; }
          uploadStatus.textContent = 'Enviando arquivo para o servidor...';
          const fd = new FormData();
          fd.append('video', pendingFile);
          fd.append('room', room);
          try {
            let res = await fetch(`/upload/${encodeURIComponent(room)}`, { method: 'POST', body: fd });
            if (!res.ok) {
              console.warn('/upload/:room falhou', res.status);
              res = await fetch('/upload', { method:'POST', body: fd });
            }
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const json = await res.json();

            let payload;
            if (typeof json === 'string') payload = { video: json };
            else if (json && json.video) payload = json;
            else if (json && typeof json === 'object') payload = json;
            else throw new Error('Resposta inválida do servidor');

            // Apply locally and emit to room
            try { if (payload.video) setVideo(payload); else setVideo(payload); } catch(e){ console.warn('setVideo fallback', e); }

            uploadStatus.textContent = 'Upload concluído e enviado à sala.';
            logStatus('Upload OK — vídeo disponível');
            fileInput.value = '';
            pendingFile = null;

            try {
              socket.emit('video-ready', { room, video: payload }, (ack) => {
                if (ack && ack.ok) console.log('server ack video-ready');
              });
            } catch (err) {
              try { socket.emit('video-ready', payload); } catch(_) { console.warn('emit video-ready falhou', _); }
            }

            exitConfirmMode();
          } catch (err) {
            console.error('Erro upload (confirm)', err);
            uploadStatus.textContent = 'Erro no upload';
            alert('Erro no upload: ' + (err.message || err));
          }
          return;
        }

        // no pending selection
        alert('Nenhum vídeo selecionado. Escolha um arquivo (clicando no seletor) ou informe um YouTube antes de enviar.');
      }
    });

    // If user selects a file while in confirm mode, pendingFile is already set in fileInput listener.
    // If user selects a file outside confirm mode (legacy), uploadBtn handles immediate upload.

    function escapeHtml(s){ if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function formatTime(ts){ const d = new Date(ts); return d.toLocaleTimeString(); }

    // ALTERADO: autoscroll do chat — só rola para baixo se o usuário já estiver perto do final.
    function appendMessage(msg){
      const el = document.createElement('div'); el.className = 'msg' + (msg.user === nickname ? ' mine' : '');
      el.innerHTML = `<strong style="font-size:12px">${escapeHtml(msg.user)}</strong><div style="margin-top:6px">${escapeHtml(msg.text)}</div><div style="font-size:11px;color:#999;margin-top:6px">${formatTime(msg.ts || Date.now())}</div>`;
      // detect if user is near bottom
      const atBottom = (messages.scrollHeight - messages.clientHeight - messages.scrollTop) < 80;
      messages.appendChild(el);
      if (atBottom) { messages.scrollTop = messages.scrollHeight; } // only auto-scroll if user was at/bottom
    }

    sendBtn.addEventListener('click', sendChat);
    chatInput.addEventListener('keypress', (e)=> { if (e.key === 'Enter') { e.preventDefault(); sendChat(); } });

    function sendChat(){
      const txt = chatInput.value.trim(); if (!txt) return; if (!room) return alert('Entre em uma sala primeiro');
      socket.emit('chat-message', { room, user: nickname || 'Guest', text: txt, ts: nowMs() });
      chatInput.value='';
    }

    // -------------------------
    // YouTube API helpers (mantive fetch/meta helpers)
    // -------------------------
    function loadYouTubeAPI(){
      return new Promise((resolve) => {
        if (ytApiReady) return resolve();
        if (window.YT && window.YT.Player) {
          ytApiReady = true; return resolve();
        }
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        tag.async = true;
        document.head.appendChild(tag);
        window.onYouTubeIframeAPIReady = function(){
          ytApiReady = true;
          resolve();
        };
        setTimeout(()=> {
          if (!ytApiReady && window.YT && window.YT.Player) { ytApiReady = true; resolve(); }
        }, 3000);
      });
    }

    function showUnembeddableUI(id, code){
      ytContainer.style.display = 'none';
      placeholder.style.display = 'flex';
      const link = `https://www.youtube.com/watch?v=${encodeURIComponent(id)}`;
      const msg = document.createElement('div');
      msg.style.color = '#fff';
      msg.style.textAlign = 'center';
      msg.innerHTML = `<div style="margin-bottom:8px">Este vídeo não permite incorporação (código ${code}).</div><a href="${link}" target="_blank" rel="noopener" style="background:#fff;color:#000;padding:8px 12px;border-radius:8px;text-decoration:none">Abrir no YouTube</a>`;
      uploadStatus.innerHTML = '';
      uploadStatus.appendChild(msg);
      try { socket.emit('chat-message', { room, user: 'System', text: `Vídeo não incorporável: ${link}`, ts: Date.now() }); } catch(e){}
    }

    // openYouTubePlayer rebuilt (mantive lógica segura de origin + enablejsapi)
    function openYouTubePlayer(id){
      isYouTube = true;
      clearYouTubePlayerInterval();
      ytContainer.innerHTML = '';
      if (ytPlayer && typeof ytPlayer.destroy === 'function') {
        try { ytPlayer.destroy(); } catch(e){}
      }
      const iframeId = 'yt-e-player-iframe-' + Math.random().toString(36).slice(2,9);
      const wrapper = document.createElement('div');
      wrapper.style.width = '100%';
      wrapper.style.height = '100%';
      wrapper.id = 'yt-wrapper-' + iframeId;

      const origin = window.location.origin || (window.location.protocol + '//' + window.location.host);
      // ADJUSTED: add controls=0 and iv_load_policy=3 to reduce YouTube overlays and annotations.
      const src = 'https://www.youtube.com/embed/' + encodeURIComponent(id) +
                  '?enablejsapi=1&controls=0&iv_load_policy=3&rel=0&modestbranding=1&playsinline=1&autoplay=1&origin=' + encodeURIComponent(origin);

      const iframe = document.createElement('iframe');
      iframe.id = iframeId;
      iframe.width = '100%';
      iframe.height = '100%';
      iframe.frameBorder = '0';
      // keep autoplay and fullscreen permissions but we disable pointer events so the iframe UI doesn't capture clicks
      iframe.allow = 'autoplay; encrypted-media; picture-in-picture; fullscreen';
      iframe.allowFullscreen = true;
      iframe.src = src;
      iframe.style.border = '0';
      iframe.style.width = '100%';
      iframe.style.height = '100%';
      iframe.setAttribute('referrerpolicy', 'no-referrer-when-downgrade');

      // Prevent iframe from capturing pointer events so your overlay is the only interactive UI.
      // The player is still controllable via the YT API (postMessage) from this page.
      try { iframe.style.pointerEvents = 'none'; } catch (e) { /* ignore */ }

      wrapper.appendChild(iframe);
      ytContainer.appendChild(wrapper);
      ytContainer.style.display = 'block';
      placeholder.style.display = 'none';
      video.style.display = 'none';

      loadYouTubeAPI().then(()=> {
        try {
          // NOTE: playerVars.controls set to 0 to hide YouTube's built-in controls so only our overlay is visible.
          ytPlayer = new YT.Player(iframeId, {
            videoId: id,
            playerVars: {
              controls: 0,
              modestbranding: 1,
              rel: 0,
              playsinline: 1,
              disablekb: 1,
              autoplay: 1,
              iv_load_policy: 3,
              origin: origin
            },
            events: {
              onReady: (e) => {
                try {
                  const f = document.getElementById(iframeId);
                  if (f) f.setAttribute('allow', 'autoplay; fullscreen; encrypted-media; picture-in-picture');
                } catch(e){}
                try { e.target.playVideo(); } catch(e){}
                updatePlayPauseUI();
                startYouTubePoll();
                qualityLabel.textContent = 'Qualidade: YouTube';
                try { uploadStatus.innerHTML = ''; } catch(e){}
              },
              onStateChange: (e) => {
                updatePlayPauseUI();
                if (isHost) {
                  const playing = (e.data === YT.PlayerState.PLAYING);
                  sendControl(playing);
                } else {
                  // ALTERADO: when a guest triggers state change (e.g. via our overlay), we still emit and request authoritative sync.
                  const playing = (e.data === YT.PlayerState.PLAYING);
                  sendControl(playing);
                }
              },
              onError: (e) => {
                console.warn('YT onError', e.data);
                if (e.data === 101 || e.data === 150) {
                  showUnembeddableUI(id, e.data);
                } else {
                  if (uploadStatus) uploadStatus.textContent = 'Vídeo indisponível (código ' + e.data + ').';
                  try { e.target.destroy && e.target.destroy(); } catch(_){}
                  ytPlayer = null;
                  isYouTube = false;
                  ytContainer.style.display = 'none';
                  placeholder.style.display = 'flex';
                  qualityLabel.textContent = 'Qualidade: -';
                }
              }
            }
          });
        } catch (err) {
          console.warn('Erro criando YT.Player', err);
          if (uploadStatus) uploadStatus.textContent = 'Falha ao criar o player do YouTube.';
          ytContainer.style.display = 'none';
          placeholder.style.display = 'flex';
          isYouTube = false;
        }
      }).catch(err=>{
        console.warn('YT API load failed', err);
        if (uploadStatus) uploadStatus.textContent = 'Falha ao carregar o player do YouTube.';
        ytContainer.style.display = 'none';
        placeholder.style.display = 'flex';
      });
    }

    function startYouTubePoll(){
      clearYouTubePlayerInterval();
      ytPollInterval = setInterval(()=> {
        if (!ytPlayer) return;
        try { updateProgressUI(); } catch(e){}
      }, 250);
    }
    function clearYouTubePlayerInterval(){
      if (ytPollInterval) { clearInterval(ytPollInterval); ytPollInterval = null; }
    }

    // -------------------------
    // CONTROLS (play/seek/mute/forward/back)
    // -------------------------
    playBtn.addEventListener('click', (e)=>{ togglePlay(); e.stopPropagation(); });
    backBtn.addEventListener('click', (e)=> {
      if (isYouTube && ytPlayer) {
        const cur = ytPlayer.getCurrentTime ? ytPlayer.getCurrentTime() : 0;
        ytPlayer.seekTo(Math.max(0, cur - 10), true);
        // ALTERADO: notificar servidor após alteração de seek via botão
        try { sendControl(!false); } catch(e){}
      } else {
        video.currentTime = Math.max(0, video.currentTime - 10);
        try { sendControl(!video.paused); } catch(e){}
      }
      showControlsTemporarily(); e.stopPropagation();
    });
    forwardBtn.addEventListener('click', (e)=> {
      if (isYouTube && ytPlayer) {
        const cur = ytPlayer.getCurrentTime ? ytPlayer.getCurrentTime() : 0;
        const dur = ytPlayer.getDuration ? ytPlayer.getDuration() : cur;
        ytPlayer.seekTo(Math.min(dur, cur + 10), true);
        // ALTERADO: notificar servidor após alteração de seek via botão
        try { sendControl(!false); } catch(e){}
      } else {
        video.currentTime = Math.min((video.duration||0), video.currentTime + 10);
        try { sendControl(!video.paused); } catch(e){}
      }
      showControlsTemporarily(); e.stopPropagation();
    });

    muteBtn.addEventListener('click', (e)=> {
      if (isYouTube && ytPlayer) {
        if (ytPlayer.isMuted && ytPlayer.isMuted()) {
          ytPlayer.unMute();
          volIcon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3z"/>';
        } else {
          ytPlayer.mute();
          volIcon.innerHTML = '<path d="M16.5 12c0-1.77-.77-3.36-2-4.47v8.94c1.23-1.11 2-2.7 2-4.47zM5 9v6h4l5 5V4L9 9H5z"/>';
        }
      } else {
        video.muted = !video.muted;
        if (video.muted) {
          volIcon.innerHTML = '<path d="M16.5 12c0-1.77-.77-3.36-2-4.47v8.94c1.23-1.11 2-2.7 2-4.47zM5 9v6h4l5 5V4L9 9H5z"/>';
        } else {
          volIcon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3z"/>';
        }
      }
      showControlsTemporarily();
      e.stopPropagation();
    });

    fsBtn.addEventListener('click', (e) => {
      const el = videoInner;
      if (!document.fullscreenElement) {
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      }
      showControlsTemporarily();
      e.stopPropagation();
    });

    function updateProgressUI(){
      if (isYouTube && ytPlayer) {
        const dur = ytPlayer.getDuration ? ytPlayer.getDuration() : 0;
        const cur = ytPlayer.getCurrentTime ? ytPlayer.getCurrentTime() : 0;
        if (!isFinite(dur) || dur === 0) {
          progressBar.style.width = '0%';
          currentTimeEl.textContent = '0:00';
          durationEl.textContent = fmtTime(dur || 0);
          return;
        }
        const pct = (cur / dur) * 100;
        progressBar.style.width = pct + '%';
        currentTimeEl.textContent = fmtTime(cur);
        durationEl.textContent = fmtTime(dur);
        return;
      }

      if (!video || !isFinite(video.duration) || video.duration === 0) {
        progressBar.style.width = '0%';
        currentTimeEl.textContent = '0:00';
        durationEl.textContent = fmtTime(video.duration || 0);
        return;
      }
      const pct = (video.currentTime / video.duration) * 100;
      progressBar.style.width = pct + '%';
      currentTimeEl.textContent = fmtTime(video.currentTime);
      durationEl.textContent = fmtTime(video.duration);
    }

    progress.addEventListener('click', (e)=>{
      const rect = progress.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const pct = Math.max(0, Math.min(1, x / rect.width));
      if (isYouTube && ytPlayer) {
        const dur = ytPlayer.getDuration ? ytPlayer.getDuration() : 0;
        if (dur > 0) {
          ytPlayer.seekTo(pct * dur, true);
          // ALTERADO: after guest/host seek via progress, emit control to server
          try { sendControl(true); } catch(e){}
        }
      } else {
        if (isFinite(video.duration)) {
          video.currentTime = pct * video.duration;
          // ALTERADO: after local video seek, emit control
          try { sendControl(!video.paused); } catch(e){}
        }
      }
      showControlsTemporarily();
      e.stopPropagation();
    });

    video.addEventListener('timeupdate', updateProgressUI);
    video.addEventListener('loadedmetadata', ()=> {
      durationEl.textContent = fmtTime(video.duration);
      updateProgressUI();
      updatePlayPauseUI();
    });
    // ALTERADO: play/pause/seek events já emitem controle — mantive, mas sendControl agora pede request-sync para guests
    video.addEventListener('play', ()=> { updatePlayPauseUI(); sendControl(true); });
    video.addEventListener('pause', ()=> { updatePlayPauseUI(); sendControl(false); });
    video.addEventListener('seeked', ()=> { updateProgressUI(); sendControl(!video.paused); });

    videoInner.addEventListener('mousemove', (e)=>{ showControlsTemporarily(); });
    videoInner.addEventListener('touchstart', ()=> showControlsTemporarily());

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && document.activeElement !== chatInput && document.activeElement.tagName.toLowerCase() !== 'input') {
        e.preventDefault();
        togglePlay();
      }
    });

    // -------------------------
    // YouTube API helpers (mantive fetch/meta helpers)
    // -------------------------
    function loadYouTubeAPI(){
      return new Promise((resolve) => {
        if (ytApiReady) return resolve();
        if (window.YT && window.YT.Player) {
          ytApiReady = true; return resolve();
        }
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        tag.async = true;
        document.head.appendChild(tag);
        window.onYouTubeIframeAPIReady = function(){
          ytApiReady = true;
          resolve();
        };
        setTimeout(()=> {
          if (!ytApiReady && window.YT && window.YT.Player) { ytApiReady = true; resolve(); }
        }, 3000);
      });
    }

    function showUnembeddableUI(id, code){
      ytContainer.style.display = 'none';
      placeholder.style.display = 'flex';
      const link = `https://www.youtube.com/watch?v=${encodeURIComponent(id)}`;
      const msg = document.createElement('div');
      msg.style.color = '#fff';
      msg.style.textAlign = 'center';
      msg.innerHTML = `<div style="margin-bottom:8px">Este vídeo não permite incorporação (código ${code}).</div><a href="${link}" target="_blank" rel="noopener" style="background:#fff;color:#000;padding:8px 12px;border-radius:8px;text-decoration:none">Abrir no YouTube</a>`;
      uploadStatus.innerHTML = '';
      uploadStatus.appendChild(msg);
      try { socket.emit('chat-message', { room, user: 'System', text: `Vídeo não incorporável: ${link}`, ts: Date.now() }); } catch(e){}
    }

    // openYouTubePlayer rebuilt (mantive lógica segura de origin + enablejsapi)
    // (já declarado acima — mantive para consistência)
    // -------------------------
    // sync: quando receber 'sync' do servidor, aplicamos estado (já centralizado em handleSync)
    // -------------------------

    console.log('Frontend pronto — YouTube integrado (sem modal) e botão "Mudar vídeo" com confirmação implementado.');
  </script>
